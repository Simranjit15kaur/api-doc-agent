<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Doc Agent — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 520px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(88, 166, 255, 0.2);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      color: #8b949e;
      font-size: 14px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
      transition: border-color 0.3s ease;
    }

    .card:hover {
      border-color: #58a6ff33;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    label .hint {
      font-weight: 400;
      color: #8b949e;
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="password"],
    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e6edf3;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    input::placeholder {
      color: #484f58;
    }

    .toggle-visibility {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .toggle-visibility:hover {
      color: #e6edf3;
    }

    select {
      width: 100%;
      padding: 12px 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e6edf3;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238b949e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 16px center;
      transition: all 0.2s ease;
    }

    select:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .save-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(88, 166, 255, 0.3);
    }

    .save-btn:active {
      transform: translateY(0);
    }

    .status-message {
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      margin-top: 16px;
      transition: all 0.3s ease;
    }

    .status-message.success {
      color: #3fb950;
    }

    .status-message.error {
      color: #f85149;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeIn 0.4s ease forwards;
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">🔌</div>
      <h1>API Doc Agent</h1>
      <p>Configure your agent settings</p>
    </div>

    <div class="card">
      <div class="card-title">🔑 Authentication</div>
      <div class="form-group">
        <label>
          Gemini API Key
          <span class="hint">Get yours at <a href="https://aistudio.google.com/apikey" target="_blank" style="color: #58a6ff; text-decoration: none;">aistudio.google.com</a></span>
        </label>
        <div class="input-wrapper">
          <input type="password" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off">
          <button class="toggle-visibility" id="toggleKey" title="Show/hide key">👁</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ Preferences</div>
      <div class="form-group">
        <label>Preferred Code Language</label>
        <select id="languageSelect">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="curl">cURL</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          Backend URL
          <span class="hint">Change only if you deploy your own backend</span>
        </label>
        <input type="url" id="backendUrl" placeholder="http://localhost:8000">
      </div>
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status-message" id="statusMsg"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
